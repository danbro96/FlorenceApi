# Reference Compose for FlorenceApi — florence-api (.NET frontend) + florence-worker (GPU inference sidecar).
# Every host, port, GID, and URL below is an overridable ${VAR:-default} sample from the maintainer's
# deployment — override them for your environment (see deploy/.env.example). Values marked :?required must be set.
#
# The .NET frontend serves REST (public, via the Cloudflare Tunnel) AND an agent MCP surface at /mcp
# (LAN/WireGuard-only). The Cloudflare Tunnel ingress MUST NOT route /mcp — the app 404s any /mcp
# request carrying Cloudflare edge headers as a backstop (UseMcpLanOnly).
services:
  florence-api:
    image: danbro96/florence-api:${IMAGE_TAG:-latest}
    container_name: florence-api
    environment:
      Florence__WorkerUrl: http://florence-worker:9000
      Florence__MaxImageBytes: ${MAX_IMAGE_BYTES:-8388608}
      Florence__RequestTimeoutSeconds: ${REQUEST_TIMEOUT:-60}
      Auth__ApiKeys__0__Key: ${FLORENCE_API_KEY:?required}
      Auth__ApiKeys__0__Name: ${FLORENCE_API_KEY_NAME:-prod}
      Auth__AllowedOrigins__0: ${ALLOWED_ORIGIN:-https://vision-api.lupira.com}
      RateLimit__RequestsPerMinute: ${RATE_LIMIT:-60}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-300000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=prod}
    ports:
      - "${HOST_PORT:-40380}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/readyz || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      florence-worker:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - medelynas_telemetry

  florence-worker:
    image: danbro96/florence-worker:${IMAGE_TAG:-latest}
    container_name: florence-worker
    devices:
      - /dev/dri:/dev/dri
    group_add:
      # `getent group render | cut -d: -f3` on the host; default 993 is common on Debian/Ubuntu.
      - "${RENDER_GID:-993}"
    environment:
      MODEL_ID: ${MODEL_ID:-microsoft/Florence-2-base-ft}
      MODEL_DIR: /cache/florence-ov
      DEVICE: ${DEVICE:-}
    volumes:
      - ${CACHE_DIR:-./cache}:/cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/readyz || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 10
      # First boot converts the model (5–10 min on Arc + disk I/O); generous to avoid
      # the worker being marked unhealthy mid-conversion. Subsequent starts are fast.
      start_period: 600s
    restart: unless-stopped

networks:
  default:
    driver: bridge
  medelynas_telemetry:
    external: true
    name: medelynas_telemetry
