name: ci

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_call:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore src/FlorenceApi/FlorenceApi.csproj
      - run: dotnet build src/FlorenceApi/FlorenceApi.csproj --no-restore -c Release

  worker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m py_compile florence-worker/app.py florence-worker/ov_florence2_helper.py
