name: Tests

on:
  workflow_call:
    inputs:
      run_integration:
        description: Also run the integration tests
        type: boolean
        default: false

env:
  SOLUTION: FlorenceApi.slnx
  INTEGRATION_PROJECT: tests/FlorenceApi.IntegrationTests

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet test ${{ env.SOLUTION }} -c Release --logger "trx;LogFileName=unit.trx"

  integration:
    name: Integration tests
    if: ${{ inputs.run_integration }}
    runs-on: ubuntu-latest   # in-process WebApplicationFactory (worker stubbed; no Docker needed)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet test ${{ env.INTEGRATION_PROJECT }} -c Release --logger "trx;LogFileName=integration.trx"

  worker-lint:
    name: Worker lint (py_compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m py_compile florence-worker/app.py florence-worker/ov_florence2_helper.py
