<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florence API Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 2rem; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { margin-bottom: 1rem; color: #333; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; color: #666; font-weight: 500; }
    input[type="file"], input[type="text"], select { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
    input[type="file"]:focus, input[type="text"]:focus, select:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0,102,204,0.1); }
    button { background: #0066cc; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #0052a3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .preview { margin: 1rem 0; max-width: 100%; max-height: 300px; border-radius: 4px; display: none; }
    .result { margin-top: 1rem; padding: 1rem; background: #f9f9f9; border-left: 4px solid #0066cc; border-radius: 4px; display: none; }
    .result.error { border-left-color: #cc0000; background: #fff5f5; }
    .result h3 { color: #333; margin-bottom: 0.5rem; }
    .result p { color: #666; word-break: break-word; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9rem; }
    .result .meta { margin-top: 0.5rem; color: #999; font-size: 0.8rem; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .loading { display: none; color: #0066cc; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 Florence API Demo</h1>

    <form id="form">
      <div class="form-group">
        <label for="image">Select Image:</label>
        <input type="file" id="image" accept="image/*" required>
      </div>

      <div class="form-group">
        <img id="preview" class="preview">
      </div>

      <div class="form-group">
        <label for="task">Task:</label>
        <select id="task">
          <option value="caption">Caption</option>
          <option value="ocr">OCR</option>
          <option value="object_detection">Object Detection</option>
          <option value="region_to_description">Region to Description</option>
        </select>
      </div>

      <div class="form-group">
        <label for="apiKey">API Key:</label>
        <input type="text" id="apiKey" placeholder="X-API-Key header value">
      </div>

      <button type="submit">Analyze</button>
      <span class="loading">⏳ Processing...</span>
    </form>

    <div id="result" class="result">
      <h3>Result:</h3>
      <p id="resultText"></p>
      <div id="resultMeta" class="meta"></div>
    </div>
  </div>

  <script>
    const apiBase = window.location.origin;

    // Maps the dropdown value to a request endpoint, extra body fields, and how to render the response.
    const taskMap = {
      caption:               { path: '/captions',   extras: { detail: 'short' },   render: (d) => d.caption },
      ocr:                   { path: '/ocr',        extras: {},                    render: (d) => d.text },
      object_detection:      { path: '/detections', extras: { variant: 'od' },     render: (d) => JSON.stringify(d, null, 2) },
      region_to_description: { path: '/detections', extras: { variant: 'dense' },  render: (d) => JSON.stringify(d, null, 2) },
    };

    // Cache the selected image's base64 so we read the file once.
    let cachedBase64 = null;
    let cachedMediaType = null;

    document.getElementById('image').addEventListener('change', (e) => {
      const file = e.target.files[0];
      cachedBase64 = null;
      cachedMediaType = null;
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        const dataUrl = ev.target.result;
        document.getElementById('preview').src = dataUrl;
        document.getElementById('preview').style.display = 'block';
        // dataUrl is "data:<media-type>;base64,<payload>" — split it.
        const comma = dataUrl.indexOf(',');
        const header = dataUrl.slice(5, comma); // strip "data:"
        cachedMediaType = header.replace(/;base64$/, '');
        cachedBase64 = dataUrl.slice(comma + 1);
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const task = document.getElementById('task').value;
      const apiKey = document.getElementById('apiKey').value;
      const resultDiv = document.getElementById('result');
      const resultText = document.getElementById('resultText');
      const resultMeta = document.getElementById('resultMeta');
      const button = e.target.querySelector('button');
      const loading = e.target.querySelector('.loading');

      if (!cachedBase64) {
        resultDiv.classList.add('error');
        resultText.textContent = 'Please select an image';
        resultMeta.textContent = '';
        resultDiv.style.display = 'block';
        return;
      }

      const { path, extras, render } = taskMap[task];
      const body = { image: cachedBase64, media_type: cachedMediaType, ...extras };

      const headers = { 'Content-Type': 'application/json' };
      if (apiKey) headers['X-API-Key'] = apiKey;

      button.disabled = true;
      loading.style.display = 'inline';
      resultDiv.style.display = 'none';

      try {
        const response = await fetch(`${apiBase}${path}`, {
          method: 'POST',
          headers,
          body: JSON.stringify(body),
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`${response.status}: ${errorText}`);
        }

        const data = await response.json();
        resultDiv.classList.remove('error');
        resultText.textContent = render(data);
        resultMeta.textContent = `POST ${path}`;
        resultDiv.style.display = 'block';
      } catch (error) {
        resultDiv.classList.add('error');
        resultText.textContent = `Error: ${error.message}`;
        resultMeta.textContent = '';
        resultDiv.style.display = 'block';
      } finally {
        button.disabled = false;
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
