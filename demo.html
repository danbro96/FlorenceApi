<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florence API Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 2rem; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { margin-bottom: 1rem; color: #333; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; color: #666; font-weight: 500; }
    input[type="file"], input[type="text"], select { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
    input[type="file"]:focus, input[type="text"]:focus, select:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0,102,204,0.1); }
    button { background: #0066cc; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #0052a3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .preview { margin: 1rem 0; max-width: 100%; max-height: 300px; border-radius: 4px; display: none; }
    .result { margin-top: 1rem; padding: 1rem; background: #f9f9f9; border-left: 4px solid #0066cc; border-radius: 4px; display: none; }
    .result.error { border-left-color: #cc0000; background: #fff5f5; }
    .result h3 { color: #333; margin-bottom: 0.5rem; }
    .result p { color: #666; word-break: break-word; white-space: pre-wrap; }
    .loading { display: none; color: #0066cc; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 Florence API Demo</h1>
    
    <form id="form">
      <div class="form-group">
        <label for="image">Select Image:</label>
        <input type="file" id="image" accept="image/*" required>
      </div>
      
      <div class="form-group">
        <img id="preview" class="preview">
      </div>
      
      <div class="form-group">
        <label for="task">Task:</label>
        <select id="task">
          <option value="caption">Caption</option>
          <option value="ocr">OCR</option>
          <option value="object_detection">Object Detection</option>
          <option value="region_to_description">Region to Description</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="apiKey">API Key (optional):</label>
        <input type="text" id="apiKey" placeholder="Leave blank for local testing">
      </div>
      
      <button type="submit">Analyze</button>
      <span class="loading">⏳ Processing...</span>
    </form>
    
    <div id="result" class="result">
      <h3>Result:</h3>
      <p id="resultText"></p>
    </div>
  </div>

  <script>
    const apiBase = 'https://vision.lupira.com';
    
    document.getElementById('image').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          document.getElementById('preview').src = ev.target.result;
          document.getElementById('preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });
    
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const image = document.getElementById('image').files[0];
      const task = document.getElementById('task').value;
      const apiKey = document.getElementById('apiKey').value;
      const resultDiv = document.getElementById('result');
      const resultText = document.getElementById('resultText');
      const button = e.target.querySelector('button');
      const loading = e.target.querySelector('.loading');
      
      if (!image) {
        resultDiv.classList.add('error');
        resultText.textContent = 'Please select an image';
        resultDiv.style.display = 'block';
        return;
      }
      
      button.disabled = true;
      loading.style.display = 'inline';
      resultDiv.style.display = 'none';
      
      try {
        const formData = new FormData();
        formData.append('image', image);
        formData.append('task', task);
        
        const headers = {};
        if (apiKey) {
          headers['X-API-Key'] = apiKey;
        }
        
        const response = await fetch(`${apiBase}/recognize`, {
          method: 'POST',
          body: formData,
          headers
        });
        
        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`${response.status}: ${errorText}`);
        }
        
        const data = await response.json();
        
        resultDiv.classList.remove('error');
        resultText.textContent = data.result || JSON.stringify(data, null, 2);
        resultDiv.style.display = 'block';
      } catch (error) {
        resultDiv.classList.add('error');
        resultText.textContent = `Error: ${error.message}`;
        resultDiv.style.display = 'block';
      } finally {
        button.disabled = false;
        loading.style.display = 'none';
      }
    });
  </script>
</body>
</html>
